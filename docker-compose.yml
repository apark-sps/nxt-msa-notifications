services:
  postgres:
    image: postgres:16-alpine
    container_name: nxt-postgres-local
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-notifications}
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nxt-rabbitmq-local
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
      - "5552:5552"     # RabbitMQ Streams Protocol
    # Auto-enable the streams plugin on container start
    entrypoint: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stream && docker-entrypoint.sh rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5

  notifications-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8085-8086:8085"
    environment:
      - SERVER_PORT=${SERVER_PORT:-8085}
      - DB_HOST=postgres
      - DB_HOST_RO=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-notifications}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - AMQP_URI=amqp://guest:guest@rabbitmq:5672/
      - STREAM_URI=rabbitmq-stream://guest:guest@rabbitmq:5552/
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
